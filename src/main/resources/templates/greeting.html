<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form with AJAX</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
<form id="userForm">
    <table>
        <tr>
            <td><label for="name">Your name:</label></td>
            <td><input type="text" id="name" name="name" /></td>
        </tr>
        <tr>
            <td><label for="color">Your favourite color:</label></td>
            <td>
                <select id="color" name="color">
                    <option>Green</option>
                    <option>Red</option>
                    <option>Yellow</option>
                </select>
            </td>
        </tr>
        <tr>
            <td><label for="18-years">You are older than 18 years</label></td>
            <td><input type="checkbox" id="18-years" name="isAdult" /></td>
        </tr>
        <tr>
            <td>Your favourite time of day:</td>
            <td>
                <input type="radio" id="radio-morning" name="daytime" value="Morning" />
                <label for="radio-morning">Morning</label><br />
                <input type="radio" id="radio-evening" name="daytime" value="Evening" />
                <label for="radio-evening">Evening</label><br />
                <input type="radio" id="radio-night" name="daytime" value="Night" />
                <label for="radio-night">Night</label><br />
            </td>
        </tr>
        <tr>
            <td colspan="2"><input type="submit" value="Send" /></td>
        </tr>
    </table>
</form>

<div id="result"></div>
<script src="/js/validation.js"></script>

</body>
</html>

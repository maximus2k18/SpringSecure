server:
  port: 8086

spring:
  thymeleaf:
    enabled: true
  freemarker:
    template-loader-path: classpath:/templates/
    suffix: .ftl
    enabled: false
  datasource:
    url: jdbc:postgresql://localhost:5432/my_database
    username: postgres
    password: 12345
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
      #todo
  database: postgresql
  database-platform: org.hibernate.dialog.PostgreSQLDialect
  show-sql: true
  properties:
    hibernate:
      format_sql: true